<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesion</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="Titulos">Iniciar Sesion</h1>
  <form class="formu" id="formularioLogin">
    <label>Usuario</label>
    <input type="text" name="Usuario" id="Usuario" required>
    <label>Contraseña</label>
    <input type="password" name="Contraseña" id="Contraseña" required>
    <input type="submit" value="Ingresar">
    <p>No tienes cuenta?</p>
    <a href="registro.html">Registrate aqui</a>
  </form>

  <script>
    document.getElementById('formularioLogin').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const Usuario = document.getElementById('Usuario').value;
      const Contraseña = document.getElementById('Contraseña').value;

      fetch('http://localhost:5000/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ Usuario, Contraseña })
      })
      .then(response => response.json())
      .then(data => {
        if (data.mensaje === 'Usuario encontrado') {
          console.log('Usuario: ' + data.usuario.Usuario);
          window.location.href = 'inicio.html';
        } else {
          alert('Usuario no registrado');
          window.location.href = 'login.html';
        }
      })
      .catch(error => {
       console.log('Error completo:', error);
       alert('Error: ' + error.message);
      });
    });
  </script>
</body>
</html>
